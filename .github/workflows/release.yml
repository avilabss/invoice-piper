name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v7
        with:
          version: "v2.4"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go mod verify
      - run: go test ./...

  browser-test:
    name: Browser Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true
      - name: Configure Chrome path
        run: |
          chrome_dir="$(dirname "${{ steps.chrome.outputs.chrome-path }}")"
          echo "$chrome_dir" >> "$GITHUB_PATH"
          "${{ steps.chrome.outputs.chrome-path }}" --version
      - name: Run browser-dependent tests
        env:
          INVP_RUN_BROWSER_TESTS: "1"
        run: go test ./internal/email

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, test, browser-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build -o invp .

  prepare-version:
    name: Prepare Version
    needs: build-check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get release version
        id: version
        run: |
          existing_for_sha="$(git tag --points-at "$GITHUB_SHA" --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)"
          if [[ -n "$existing_for_sha" ]]; then
            echo "version=$existing_for_sha" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest=$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || echo "v0.0.0")
          if [[ ! "$latest" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "latest tag does not match v<major>.<minor>.<patch>: $latest" >&2
            exit 1
          fi
          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          echo "version=v${major}.${minor}.$((patch + 1))" >> "$GITHUB_OUTPUT"

  build-artifacts:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: prepare-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags "-s -w -X github.com/avilabss/invoice-piper/cmd.Version=${VERSION}" -o "invp-${GOOS}-${GOARCH}${ext}" .
      - uses: actions/upload-artifact@v4
        with:
          name: invp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: invp-*

  release:
    name: Publish Release
    needs: [prepare-version, build-artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Generate checksums
        run: sha256sum invp-* > checksums.txt
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare-version.outputs.version }}
        run: |
          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $VERSION already exists; skipping."
            exit 0
          fi

          gh release create "$VERSION" invp-* checksums.txt --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --generate-notes
