name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v7
        with:
          version: "v2.4"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go mod verify
      - run: go test ./...

  browser-test:
    name: Browser Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true
      - name: Configure Chrome path
        run: |
          chrome_dir="$(dirname "${{ steps.chrome.outputs.chrome-path }}")"
          echo "$chrome_dir" >> "$GITHUB_PATH"
          "${{ steps.chrome.outputs.chrome-path }}" --version
      - name: Run browser-dependent tests
        env:
          INVP_RUN_BROWSER_TESTS: "1"
        run: go test ./internal/email

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, browser-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build -o invp .
